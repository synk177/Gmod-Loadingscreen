<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deathrun — Verbinde…</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   DEATHRUN LOADINGSCREEN  ·  v2 (Staff via SteamID)
   Anpassen: CONFIG-Block unten. Farben: :root
   ============================================================ */
:root{
  --bg:#0b0c10; --bg-2:#0e1017; --panel:#13151d; --panel-2:#171a24;
  --line:rgba(255,255,255,.08); --line-2:rgba(255,255,255,.14);
  --text:#eceef3; --muted:#7c8192; --dim:#565b6b;

  --hazard:#ffcc00; --death:#ff4438; --runner:#2fe3c8; --orange:#ff9d3d;
  --stripe-a:#ffcc00; --stripe-b:#0b0c10;

  --role-hazard:var(--hazard); --role-death:var(--death);
  --role-runner:var(--runner); --role-orange:var(--orange);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:"Chakra Petch",system-ui,sans-serif;
  overflow:hidden;-webkit-font-smoothing:antialiased;letter-spacing:.2px}
.mono{font-family:"JetBrains Mono",ui-monospace,monospace}
img{display:block}

/* ---------- Hintergrund ---------- */
.bg{position:fixed;inset:0;z-index:0;overflow:hidden}
.bg::before{content:"";position:absolute;inset:-2px;
  background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
  background-size:46px 46px;
  mask-image:radial-gradient(ellipse 85% 75% at 30% 15%,#000 40%,transparent 100%)}
.bg::after{content:"";position:absolute;inset:0;
  background:radial-gradient(60% 60% at 82% 88%,rgba(255,68,56,.10),transparent 60%),
    radial-gradient(55% 55% at 10% 6%,rgba(255,204,0,.10),transparent 55%),
    radial-gradient(120% 120% at 50% 50%,transparent 52%,rgba(0,0,0,.78) 100%)}
.scanline{position:fixed;inset:0;z-index:1;pointer-events:none;
  background:repeating-linear-gradient(to bottom,rgba(255,255,255,.015) 0 1px,transparent 1px 3px);
  mix-blend-mode:overlay;opacity:.6}

/* ---------- Hazard-Band (Signature) ---------- */
.hazard-top{position:fixed;top:0;left:0;right:0;height:7px;z-index:6;
  background:repeating-linear-gradient(-45deg,var(--stripe-a) 0 18px,var(--stripe-b) 18px 36px);
  background-size:51px 51px;animation:march 2.4s linear infinite;
  box-shadow:0 0 22px rgba(255,204,0,.35),0 1px 0 rgba(0,0,0,.6)}
@keyframes march{to{background-position:51px 0}}

/* ---------- Grundgerüst ---------- */
.frame{position:relative;z-index:4;height:100%;display:flex;flex-direction:column;
  padding:clamp(16px,2.4vh,30px) clamp(20px,3vw,52px) clamp(14px,2vh,24px)}

/* Kopf */
.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-shrink:0}
.brand{display:flex;align-items:center;gap:13px}
.gm-tag{display:flex;align-items:center;gap:9px;font-weight:700;font-size:13px;letter-spacing:3px;
  padding:7px 12px 7px 11px;color:var(--bg);background:var(--hazard);
  clip-path:polygon(0 0,100% 0,calc(100% - 9px) 100%,0 100%);box-shadow:0 0 24px rgba(255,204,0,.3)}
.gm-tag svg{width:15px;height:15px}
.brand small{color:var(--muted);font-size:12px;letter-spacing:2px;text-transform:uppercase}
.status-pill{display:flex;align-items:center;gap:9px;font-family:"JetBrains Mono",monospace;
  font-size:12px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;
  padding:8px 14px;border:1px solid var(--line);border-radius:2px;background:rgba(0,0,0,.25)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--hazard);
  box-shadow:0 0 10px var(--hazard);animation:pulse 1.1s ease-in-out infinite}
@keyframes pulse{50%{opacity:.25;transform:scale(.7)}}

/* Haupt-Grid: Regeln | Info | Staff */
.grid{flex:1;display:grid;grid-template-columns:.92fr 1.16fr .92fr;gap:clamp(16px,1.8vw,34px);
  min-height:0;padding:clamp(14px,2.2vh,26px) 0}
.col{min-width:0;min-height:0;display:flex;flex-direction:column}

/* Panels */
.panel{background:linear-gradient(180deg,var(--panel),var(--bg-2));border:1px solid var(--line);
  border-radius:7px;box-shadow:0 30px 60px -34px rgba(0,0,0,.85);
  display:flex;flex-direction:column;flex:1;min-height:0}
.phead{display:flex;align-items:center;gap:11px;padding:16px 18px 13px;flex-shrink:0}
.phead .bar{width:4px;height:20px;border-radius:1px}
.phead h2{font-weight:700;font-size:17px;letter-spacing:2px;text-transform:uppercase}
.phead .tagr{margin-left:auto;font-family:"JetBrains Mono",monospace;font-size:10px;
  letter-spacing:2px;color:var(--dim);text-transform:uppercase}
.psep{height:1px;background:var(--line);margin:0 18px;flex-shrink:0}

/* ---------- Regeln ---------- */
.rules .phead .bar{background:var(--death);box-shadow:0 0 12px var(--death)}
.rules-scroll{overflow-y:auto;display:flex;flex-direction:column;gap:14px;padding:14px 18px 18px;min-height:0}
.rules-scroll::-webkit-scrollbar{width:5px}
.rules-scroll::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:3px}
.rgroup-title{display:flex;align-items:center;gap:8px;margin-bottom:8px;
  font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:2.5px;text-transform:uppercase}
.rgroup-title .tick{width:8px;height:8px;border-radius:50%}
.g-general .tick{background:var(--hazard)} .g-general .rgroup-title{color:var(--hazard)}
.g-runner  .tick{background:var(--runner)} .g-runner  .rgroup-title{color:var(--runner)}
.g-death   .tick{background:var(--death)}  .g-death   .rgroup-title{color:var(--death)}
.rlist{list-style:none;display:flex;flex-direction:column;gap:6px}
.rlist li{display:flex;gap:11px;font-size:13.5px;line-height:1.38;color:#cfd2db}
.rlist li .n{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--dim);
  padding-top:2px;flex-shrink:0;min-width:20px}

/* ---------- Mitte: Info ---------- */
.center{align-items:center;text-align:center;justify-content:flex-start;gap:clamp(14px,2vh,22px);
  padding-top:clamp(6px,1.5vh,18px)}
.eyebrow{font-family:"JetBrains Mono",monospace;font-size:12px;letter-spacing:4px;text-transform:uppercase;
  color:var(--hazard);display:flex;align-items:center;gap:10px}
.eyebrow::before,.eyebrow::after{content:"";width:22px;height:2px;background:var(--hazard);opacity:.8}
.server-name{font-weight:700;line-height:.98;font-size:clamp(30px,4.2vw,58px);letter-spacing:-.5px;
  text-transform:uppercase;text-wrap:balance}
.server-name .accent{color:var(--hazard);text-shadow:0 0 30px rgba(255,204,0,.35)}
.subtitle{color:var(--muted);font-size:16px;letter-spacing:.4px;margin-top:-6px}
.links{display:flex;flex-direction:column;gap:9px;align-items:center}
.links a{display:inline-flex;align-items:center;gap:9px;color:var(--text);
  font-size:15px;text-decoration:none;padding:5px 4px}
.links a:hover{color:var(--hazard)}
.links svg{width:16px;height:16px;color:var(--hazard);flex-shrink:0}
.motd{max-width:440px;color:#b9bdca;font-size:14.5px;line-height:1.55;
  background:rgba(0,0,0,.22);border:1px solid var(--line);border-left:3px solid var(--hazard);
  border-radius:4px;padding:14px 18px;text-align:left}
.motd .k{display:block;font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:2px;
  text-transform:uppercase;color:var(--dim);margin-bottom:6px}

/* Spieler-Begrüßung */
.me{display:flex;align-items:center;gap:12px;background:rgba(0,0,0,.25);border:1px solid var(--line);
  border-radius:6px;padding:9px 14px 9px 10px}
.me .ava{width:44px;height:44px;border-radius:5px;overflow:hidden;flex-shrink:0;position:relative;background:var(--panel-2)}
.me .txt{text-align:left;min-width:0}
.me .k{font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--hazard)}
.me .nm{font-weight:600;font-size:16px;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.me .sid{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--dim)}

/* ---------- Staff ---------- */
.staff .phead .bar{background:var(--hazard);box-shadow:0 0 12px var(--hazard)}
.staff-scroll{overflow-y:auto;padding:16px 18px 18px;min-height:0}
.staff-scroll::-webkit-scrollbar{width:5px}
.staff-scroll::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:3px}
.staff-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(92px,1fr));gap:14px}
.scard{display:flex;flex-direction:column;align-items:center;gap:9px;text-align:center;
  padding:14px 8px 12px;background:rgba(0,0,0,.22);border:1px solid var(--line);border-radius:6px;
  opacity:0;transform:translateY(8px);animation:rise .5s ease forwards}
@keyframes rise{to{opacity:1;transform:none}}
.scard:hover{border-color:var(--rc)}
.ava{position:relative;width:66px;height:66px;border-radius:8px;overflow:hidden;
  background:var(--panel-2);box-shadow:0 0 0 2px var(--rc),0 0 18px -4px var(--rc)}
.ava img{width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .35s}
.ava img.on{opacity:1}
/* Initialen = reiner Fallback. Werden per JS ausgeblendet, sobald ein Bild lädt. */
.ava .ini{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:22px;color:var(--rc);letter-spacing:1px;background:var(--panel-2)}
.scard .nm{font-weight:600;font-size:14px;line-height:1.15;max-width:100%;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.scard .role{font-family:"JetBrains Mono",monospace;font-size:10.5px;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--rc)}

/* ---------- Loader (unten, Signature) ---------- */
.dock{flex-shrink:0;display:flex;flex-direction:column;gap:12px}
.loader-head{display:flex;align-items:baseline;justify-content:space-between;gap:16px}
.loader-head .lbl{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:2.5px;
  text-transform:uppercase;color:var(--muted)}
.loader-head .pct{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:22px;
  color:var(--hazard);letter-spacing:1px}
.fuse{position:relative;height:16px;border-radius:2px;background:var(--panel-2);border:1px solid var(--line)}
.fuse-track{position:absolute;inset:1px;border-radius:1px;overflow:hidden;background:#0a0b0f}
.fuse-fill{height:100%;width:0%;
  background:repeating-linear-gradient(-45deg,var(--hazard) 0 11px,#161200 11px 22px);
  background-size:31px 31px;animation:march 1.4s linear infinite;
  transition:width .45s cubic-bezier(.4,0,.15,1)}
.spark{position:absolute;top:-4px;bottom:-4px;width:3px;left:0%;background:#fff8dc;border-radius:2px;
  box-shadow:0 0 6px 2px var(--hazard),0 0 18px 5px rgba(255,204,0,.7);
  transition:left .45s cubic-bezier(.4,0,.15,1);animation:flick .12s steps(2) infinite}
@keyframes flick{50%{opacity:.65}}
.dockrow{display:flex;align-items:center;justify-content:space-between;gap:16px}
.file{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--muted);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.file b{color:var(--text);font-weight:500}
.dockrow .right{display:flex;align-items:center;gap:18px;flex-shrink:0}
.count{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--dim)}
.warn{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--dim)}

/* ---------- Responsive ---------- */
@media (max-width:1080px){ .grid{grid-template-columns:1fr;overflow-y:auto;gap:16px} }
@media (prefers-reduced-motion:reduce){
  .hazard-top,.fuse-fill,.spark,.scard{animation:none}
  .scard{opacity:1;transform:none}
  *{transition-duration:.01ms!important}
}
</style>
</head>
<body>
<div class="bg"></div>
<div class="scanline"></div>
<div class="hazard-top"></div>

<div class="frame">

  <!-- Kopf -->
  <div class="topbar">
    <div class="brand">
      <div class="gm-tag">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 2 21h20L12 2Z"/><path d="M12 9v5"/><path d="M12 17.5h.01"/></svg>
        DEATHRUN
      </div>
      <small id="hostSub">Escape the traps</small>
    </div>
    <div class="status-pill"><span class="dot"></span><span id="phase">Verbinde</span></div>
  </div>

  <!-- Haupt -->
  <div class="grid">

    <!-- Regeln -->
    <div class="col">
      <div class="panel rules">
        <div class="phead"><span class="bar"></span><h2>Regeln</h2><span class="tagr">Pflichtlektüre</span></div>
        <div class="psep"></div>
        <div class="rules-scroll" id="rulesScroll"></div>
      </div>
    </div>

    <!-- Mitte -->
    <div class="col center">
      <div class="eyebrow">Server wird geladen</div>
      <h1 class="server-name" id="serverName">Trap House<span class="accent"> // DEATHRUN</span></h1>
      <div class="subtitle" id="subtitle">Have fun and play</div>

      <div class="me" id="meCard">
        <div class="ava"><span class="ini" id="meIni">?</span><img id="meImg" alt=""></div>
        <div class="txt">
          <div class="k">Verbunden als</div>
          <div class="nm" id="meName">Warte auf Steam…</div>
          <div class="sid" id="meSid">—</div>
        </div>
      </div>

      <div class="links" id="links"></div>
      <div class="motd"><span class="k">Info</span><span id="motd"></span></div>
    </div>

    <!-- Staff -->
    <div class="col">
      <div class="panel staff">
        <div class="phead"><span class="bar"></span><h2>Team</h2><span class="tagr" id="staffCount">—</span></div>
        <div class="psep"></div>
        <div class="staff-scroll"><div class="staff-grid" id="staffGrid"></div></div>
      </div>
    </div>

  </div>

  <!-- Loader unten -->
  <div class="dock">
    <div class="loader-head">
      <span class="lbl">Download &nbsp;/&nbsp; Zündschnur</span>
      <span class="pct" id="pct">0%</span>
    </div>
    <div class="fuse">
      <div class="fuse-track"><div class="fuse-fill" id="fill"></div></div>
      <div class="spark" id="spark"></div>
    </div>
    <div class="dockrow">
      <span class="file" id="file">Warte auf Server…</span>
      <span class="right">
        <span class="count" id="count"></span>
        <span class="warn">Regelverstoß = Kick / Ban</span>
      </span>
    </div>
  </div>

</div>

<script>
/* ============================================================
   ⚙️  CONFIG  —  HIER ALLES ANPASSEN
   ============================================================ */
const CONFIG = {
  serverName:   "Trap House",
  serverAccent: "// DEATHRUN",
  subtitle:     "Have fun and play",
  subtitleTag:  "Escape the traps",

  motd: "Willkommen auf unserem Deathrun-Server! Weiche den Fallen aus, erreiche das Ziel oder werde selbst zum Death und mach Jagd. Viel Erfolg!",

  links: [
    { type:"web",     label:"deinserver.de",         url:"https://deinserver.de" },
    { type:"store",   label:"store.deinserver.de",   url:"https://store.deinserver.de" },
    { type:"discord", label:"discord.gg/deinserver", url:"https://discord.gg/deinserver" },
  ],

  /* ---- STAFF: nur steamid + role -> Avatar & Name werden abgefragt ----
     steamid : SteamID64 (17 Ziffern, 7656...)
     role    : Rangbezeichnung (Farbe via roleColors)
     name    : optional, überschreibt den Steam-Namen
     avatar  : optional, feste Bild-URL (dann wird nichts abgefragt)          */
  staff: [
    { steamid:"76561198752515212", role:"Owner"     },
    { steamid:"76561197960287930", role:"Senior"    },
    { steamid:"76561198000000000", role:"Admin"     },
    { steamid:"76561198010000000", role:"Moderator" },
    { steamid:"76561198020000000", role:"Operator"  },
    { steamid:"76561198030000000", role:"Operator"  },
  ],

  /* Rolle -> Farbe: hazard (gelb) | death (rot) | orange | runner (türkis) */
  roleColors: {
    Owner:"hazard", Co_Owner:"hazard", Senior:"death", Admin:"death",
    "Head-Admin":"death", Moderator:"orange", Supporter:"orange",
    Operator:"runner", Developer:"runner", Dev:"runner", Builder:"runner",
    _default:"runner",
  },
};

/* ============================================================
   📜  REGELN  —  Kategorien: general / runner / death
   ============================================================ */
const RULES = {
  general: [
    "Sei respektvoll – kein Beleidigen, Rassismus oder Belästigung.",
    "Cheats, Hacks, Scripts & Exploits sind strikt verboten.",
    "Kein Spam oder Werbung in Chat und Voice.",
    "Anweisungen des Teams sind immer zu befolgen.",
  ],
  runner: [
    "Kein Ghosting – verrate keine Trap-Positionen an tote Spieler.",
    "Blockiere oder behindere andere Runner nicht absichtlich.",
    "Nutze keine Map-Bugs, um Traps zu umgehen.",
  ],
  death: [
    "Aktiviere Traps aktiv – kein Delaying oder Trap-Camping.",
    "Verzögere die Runde nicht absichtlich.",
  ],
};

/* ============================================================
   Rendering-Helfer
   ============================================================ */
const $ = (id)=>document.getElementById(id);
const roleVar  = (role)=>`var(--role-${CONFIG.roleColors[role] || CONFIG.roleColors._default})`;
const initials = (n)=> (n||"?").trim().split(/\s+/).map(w=>w[0]||"").slice(0,2).join("").toUpperCase() || "?";

$("serverName").innerHTML = `${CONFIG.serverName}<span class="accent"> ${CONFIG.serverAccent}</span>`;
$("subtitle").textContent = CONFIG.subtitle;
$("hostSub").textContent  = CONFIG.subtitleTag;
$("motd").textContent     = CONFIG.motd;

/* Links */
(function(){
  const icons = {
    web:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a15 15 0 0 1 0 18M12 3a15 15 0 0 0 0 18"/></svg>',
    store:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="20" r="1.4"/><circle cx="18" cy="20" r="1.4"/><path d="M2 3h3l2.5 13h11l2-9H6"/></svg>',
    discord:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 5.3A18 18 0 0 0 15.6 4l-.3.5a13 13 0 0 1 3.9 2A16.5 16.5 0 0 0 5 6.5a13 13 0 0 1 3.9-2L8.6 4A18 18 0 0 0 4 5.3 18.6 18.6 0 0 0 1 18.3a17 17 0 0 0 5.3 2.7l.7-1.6c-.9-.3-1.8-.7-2.6-1.2l.5-.4a12 12 0 0 0 10.9 0l.5.4c-.8.5-1.7.9-2.6 1.2l.7 1.6a17 17 0 0 0 5.3-2.7 18.5 18.5 0 0 0-3-13Zm-11.7 10c-.9 0-1.6-.9-1.6-1.9s.7-1.9 1.6-1.9 1.6.9 1.6 1.9-.7 1.9-1.6 1.9Zm7.4 0c-.9 0-1.6-.9-1.6-1.9s.7-1.9 1.6-1.9 1.6.9 1.6 1.9-.7 1.9-1.6 1.9Z"/></svg>',
  };
  $("links").innerHTML = CONFIG.links.map(l=>{
    const ic = icons[l.type] || icons.web;
    return `<a href="${l.url}" target="_blank" rel="noopener">${ic}${l.label}</a>`;
  }).join("");
})();

/* Regeln */
(function(){
  const meta = { general:{cls:"g-general",label:"Allgemein"}, runner:{cls:"g-runner",label:"Runner"}, death:{cls:"g-death",label:"Death"} };
  let n=0, html="";
  for(const key of ["general","runner","death"]){
    const items = RULES[key]; if(!items||!items.length) continue;
    const m = meta[key];
    html += `<div class="rgroup ${m.cls}"><div class="rgroup-title"><span class="tick"></span>${m.label}</div><ul class="rlist">`;
    for(const r of items){ n++; html += `<li><span class="n">${String(n).padStart(2,"0")}</span><span>${r}</span></li>`; }
    html += `</ul></div>`;
  }
  $("rulesScroll").innerHTML = html;
})();

/* ============================================================
   STEAM-ABFRAGE (Name + Avatar per SteamID64)
   Nutzt playerdb.co (CORS-fähig, kein API-Key nötig).
   ============================================================ */
async function fetchSteam(steamid){
  const ctrl = new AbortController();
  const t = setTimeout(()=>ctrl.abort(), 6000);
  try{
    const r = await fetch(`https://playerdb.co/api/player/steam/${steamid}`, {signal:ctrl.signal});
    const j = await r.json();
    const p = j?.data?.player || {};
    const name   = p.username || p.meta?.personaname;
    const avatar = p.avatar || p.meta?.avatarfull || p.meta?.avatar;
    if(!avatar) throw new Error("no avatar");
    return { name, avatar };
  } finally { clearTimeout(t); }
}

/* --- Optional: offizielle Steam Web API (eigener Key nötig, ggf. Proxy) ---
async function fetchSteamAPI(steamid){
  const KEY = "DEIN_STEAM_API_KEY";
  const r = await fetch(`https://api.steampowered.com/ISteamUser/GetPlayerSummaries/v2/?key=${KEY}&steamids=${steamid}`);
  const j = await r.json(); const p = j.response.players[0];
  return { name:p.personaname, avatar:p.avatarfull };
} */

/* Avatar setzen:
   - Initialen sind nur Fallback und werden ausgeblendet, sobald ein Bild lädt.
   - Lädt kein Bild (Fehler / keine URL), bleiben die Initialen sichtbar.        */
function setAvatar(imgEl, iniEl, url, name){
  iniEl.textContent = initials(name);
  iniEl.style.display = "flex";      // Standard: Fallback zeigen
  imgEl.classList.remove("on");
  imgEl.removeAttribute("src");
  if(!url) return;
  imgEl.onload  = ()=>{ imgEl.classList.add("on"); iniEl.style.display = "none"; };  // Bild da -> Buchstaben weg
  imgEl.onerror = ()=>{ imgEl.classList.remove("on"); iniEl.style.display = "flex"; }; // Bild fehlt -> Buchstaben zeigen
  imgEl.src = url;
}

/* Staff aufbauen + auflösen */
(function(){
  const grid = $("staffGrid");
  $("staffCount").textContent = CONFIG.staff.length + " Mitglieder";
  CONFIG.staff.forEach((m, i)=>{
    const card = document.createElement("div");
    card.className = "scard";
    card.style.setProperty("--rc", roleVar(m.role));
    card.style.animationDelay = (i*70)+"ms";
    card.innerHTML =
      `<div class="ava"><span class="ini">${initials(m.name || m.role)}</span><img alt=""></div>`+
      `<div class="nm">${m.name || "…"}</div>`+
      `<div class="role">${m.role||""}</div>`;
    grid.appendChild(card);

    const img = card.querySelector("img");
    const ini = card.querySelector(".ini");
    const nm  = card.querySelector(".nm");

    if(m.avatar){ nm.textContent = m.name || m.role; setAvatar(img, ini, m.avatar, m.name||m.role); return; }
    if(!m.steamid){ nm.textContent = m.name || m.role; return; }

    fetchSteam(m.steamid).then(res=>{
      const displayName = m.name || res.name || m.role;
      nm.textContent = displayName;
      setAvatar(img, ini, res.avatar, displayName);
    }).catch(()=>{ nm.textContent = m.name || m.role; });
  });
})();

/* ============================================================
   GMOD LOADINGSCREEN API
   ============================================================ */
let filesTotal=0, filesNeeded=0, gotGameDetails=false;
function setProgress(p){ p=Math.max(0,Math.min(100,p));
  $("fill").style.width=p+"%"; $("spark").style.left=p+"%"; $("pct").textContent=Math.round(p)+"%"; }
function updateCount(){ if(filesTotal>0) $("count").textContent = (filesTotal-filesNeeded)+" / "+filesTotal+" Dateien"; }

function showPlayer(steamid, fallbackName){
  $("meSid").textContent = steamid || "—";
  if(steamid){
    fetchSteam(steamid).then(res=>{
      $("meName").textContent = res.name || fallbackName || "Spieler";
      setAvatar($("meImg"), $("meIni"), res.avatar, res.name || fallbackName);
    }).catch(()=>{ $("meName").textContent = fallbackName || "Spieler"; $("meIni").textContent = initials(fallbackName); });
  } else { $("meName").textContent = fallbackName || "Spieler"; }
}

function GameDetails(servername, serverurl, mapname, maxplayers, steamid, gamemode){
  gotGameDetails = true;
  if(servername) $("serverName").innerHTML = servername;
  if(steamid) showPlayer(steamid);
}
function SetFilesTotal(total){ filesTotal=total|0; updateCount(); }
function SetFilesNeeded(needed){ filesNeeded=needed|0;
  if(filesTotal>0) setProgress((filesTotal-filesNeeded)/filesTotal*100);
  updateCount(); $("phase").textContent="Download"; }
function DownloadingFile(f){ f=String(f||"").replace(/^.*[\\\/]/,""); $("file").innerHTML=`Lädt: <b>${f}</b>`; }
function SetStatusChanged(s){ if(s) $("file").textContent=s; }
function SetStatus(s){ if(s) $("file").textContent=s; }
function AllFilesDownloaded(){ setProgress(100); $("phase").textContent="Bereit"; $("file").innerHTML="Betrete den Server…"; }

/* ============================================================
   DEMO-MODUS (nur außerhalb von GMod)
   ============================================================ */
window.addEventListener("load", ()=>{
  setTimeout(()=>{
    if(gotGameDetails) return;
    showPlayer("76561198210577821", "Spieler");
    const demo=["dr_atomic.bsp","materials/traps/spike_01.vmt","models/props/gate.mdl","sound/traps/crush.wav",
      "materials/hud/deathrun.vtf","lua/autorun/dr_init.lua","materials/skybox/space_up.vtf",
      "models/deathrun/checkpoint.mdl","sound/ambient/siren.wav","materials/traps/laser.vmt","lua/weapons/dr_deagle.lua"];
    filesTotal=demo.length; $("phase").textContent="Download"; let i=0;
    (function tick(){
      filesNeeded=demo.length-i; setProgress(i/demo.length*100); updateCount();
      if(i<demo.length) DownloadingFile(demo[i]);
      i++;
      if(i<=demo.length) setTimeout(tick, 780+Math.random()*480);
      else { AllFilesDownloaded(); setTimeout(()=>{ i=0; setProgress(0); tick(); }, 2600); }
    })();
  }, 900);
});
